name: Daily DSA Commits

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  dsa-commit:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Configure Git
        run: |
          git config --global user.name "code-with-kishan"
          git config --global user.email "kishan@example.com"
      
      - name: Run DSA Script
        run: |
          python3 scripts/add_motivation.py
      
      - name: Add and Commit
        run: |
          git add -A
          git commit -m "Day $(date +%d-%m-%Y): Daily DSA Practice" || true
      
      - name: Push to Repository
        run: |
          git push origin main || true
      
      - name: Verify
        run: |
          echo "Latest commits:"
          git log --oneline -n 5
