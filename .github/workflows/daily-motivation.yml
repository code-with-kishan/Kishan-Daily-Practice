name: Daily DSA Commits

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  dsa-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - run: |
          git config --global user.name "code-with-kishan"
          git config --global user.email "knishad0004@gmail.com"
      
      - run: python3 .github/scripts/add_motivation.py
      
      - run: |
          git add -A
          git commit -m "Day $(date +%d-%m-%Y): DSA Practice" || true
          git push origin main || true
      
      - run: git log --oneline -n 3          git add -A
          git commit -m "Day $(date +%d-%m-%Y): Daily DSA Practice" || true
      
      - name: Push to Repository
        run: |
          git push origin main || true
      
      - name: Verify
        run: |
          echo "Latest commits:"
          git log --oneline -n 5
