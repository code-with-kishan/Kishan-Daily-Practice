name: Daily Motivation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  add-motivation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
      
      - name: Run motivation script
        id: motivation
        run: |
          python .github/scripts/add_motivation.py
      
      - name: Check if README changed
        id: check_changes
        run: |
          if git diff --quiet README.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Configure git user
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      
      - name: Commit changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git add README.md
          git commit -m "✨ Daily Motivation - $(date +'%Y-%m-%d')"
      
      - name: Push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git push origin main
      
      - name: Motivation added successfully
        run: echo "✅ Daily motivation has been added to README.md"
