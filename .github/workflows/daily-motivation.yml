name: Daily Motivation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  add-motivation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run motivation script
        run: python .github/scripts/add_motivation.py
      
      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet README.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Configure git user as YOU
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --global user.name "code-with-kishan"
          git config --global user.email "your-email@example.com"
      
      - name: Commit motivation
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git add README.md
          git commit -m "Add daily motivation - $(date +'%Y-%m-%d')"
      
      - name: Add enhancement
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          echo "" >> README.md
          echo "⭐ Last updated: $(date +'%Y-%m-%d %H:%M')" >> README.md
          git add README.md
          git commit -m "Update timestamp"
      
      - name: Push commits
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git push origin main