name: Daily DSA Commits

on:
  schedule:
    # Run daily at 4:00 AM UTC (adjust timezone as needed)
    # For IST (UTC+5:30), this is 9:30 AM IST, adjust to: '30 22 * * *' for 4 AM IST previous day
    - cron: '0 4 * * *'
  
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  dsa-commit:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Important: Use a Personal Access Token to commit as your user
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set Up Git Configuration
        run: |
          # Configure git to use YOUR name and email
          # Replace with your actual name and GitHub email
          git config --global user.name "${{ vars.GIT_USER_NAME }}"
          git config --global user.email "${{ vars.GIT_USER_EMAIL }}"
      
      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
      
      - name: Run DSA Automation Script
        run: |
          python scripts/add_motivation.py
      
      - name: Push Commits to Repository
        run: |
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Commits
        run: |
          echo "✅ Daily DSA commits completed successfully!"
          git log --oneline -n 5